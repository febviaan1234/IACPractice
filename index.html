        // 2. nothing in localStorage yet — migrate legacy window.name data if present

          try { window.localStorage.setItem(STORE_KEY, JSON.stringify(legacy)); } catch(e){}

        }

  async function enterCloudUser(user, note){

  // difficulty ramps with how many you've gotten right this race.
  // Bots start very slow (~20s before the first buzz) and ease down gradually,
  // never quicker than ~4s even at a high ramp, so you always get time to read.
  const CLUE_INTERVAL = 10000; // clues auto-reveal every 10s
  // Bot timing is now expressed in CLUES, not raw milliseconds.
  // patience = how many clues must be showing before a bot will even consider buzzing.
  // At ramp 0 (first question) bots wait until ALL clues are read, then a grace delay.
  // As ramp climbs, patience drops (they buzz earlier) and the grace shrinks.
  function botParams(bot, ramp, totalLines){
    const acc = Math.min(0.97, bot.baseAcc + ramp*0.03);
    // how many clues from the END a bot is willing to jump in.
    // ramp 0 -> 0 (waits for the very last clue). grows ~0.6 clues per ramp, capped.
    const earliness = Math.min(totalLines-1, Math.floor(ramp*0.6 + (bot.baseSpeed?0:0)));
    // bot's personal patience offset: gentler bots wait a touch longer
    const personal = bot.patienceBias||0; // 0..1 clues later
    let patienceClue = Math.max(1, totalLines - earliness + personal); // 1-indexed clue count needed
    patienceClue = Math.min(patienceClue, totalLines);
    // grace delay AFTER that clue appears, before the bot actually buzzes (seconds -> ms).
    // first question very gentle (~6s), shrinking with ramp toward ~1.5s.
    const grace = Math.max(1500, 6000 - ramp*450);
    return { acc, patienceClue, grace };
  }

  /* =========================================================
     ADAPTIVE MASTERY MODEL  (Leitner-style boxes per question)
       box 0 = brand new / unseen
       box 1 = weakest (missed)  ... box 5 = mastered
     A question is "due" based on box and lastSeen index.
     Selection weights heavily toward low boxes + due items.
     ========================================================= */
  const BOX_INTERVAL = [0, 1, 3, 7, 14, 30]; // in "questions answered" units (compressed)
  function qKey(sid, idx){ return sid + ':' + idx; }

  function getMastery(p, sid, idx){
    const k = qKey(sid, idx);
    if (!p.mastery[k]) p.mastery[k] = { box:0, seen:0, correct:0, lastTick:-999, attempts:0 };
    return p.mastery[k];
  }
  function masteryLabel(box){
    return ['New','Weak','Shaky','Getting it','Strong','Mastered'][box] || 'New';
  }
  // build adaptive deck for a level + scope
  function buildAdaptiveDeck(p, scope, size, adaptiveStrength){
    // scope: any sheet id, or 'both' (all sheets), or 'mistakes'
    let pool = [];
    BANK.sheets.forEach(s=>{
      if (scope!=='both' && scope!=='mistakes' && s.id!==scope) return;
      s.questions.forEach((q,idx)=>{
        const m = getMastery(p, s.id, idx);
        pool.push({ q, sid:s.id, idx, sheet:s.name, m });
      });
    });
    if (scope==='mistakes'){
      pool = pool.filter(x=>x.m.box>=1 && x.m.box<=2 || (x.m.attempts>0 && x.m.box<3));
      if (!pool.length) return [];
    }

    const tick = p.tick || 0;
    function weight(x){
      const m = x.m;
      // base weight by box: weaker = much higher
      const boxW = [10, 30, 18, 8, 3, 0.6][m.box];
      // due bonus: overdue items get boosted
      const due = (tick - m.lastTick) >= BOX_INTERVAL[m.box] ? 1.6 : 0.7;
      // unseen handling: moderate weight, scaled down at high adaptive (focus on weak known stuff)
      const unseen = m.seen===0 ? (1.3 - adaptiveStrength*0.4) : 1;
      // blend toward uniform when adaptiveStrength low
      const adaptive = boxW*due*unseen;
      const uniform = 5;
      return adaptive*adaptiveStrength + uniform*(1-adaptiveStrength) + 0.01;
    }
    // weighted sample without replacement
    const chosen = [];
    const work = pool.slice();
    const n = Math.min(size, work.length);
    for (let i=0;i<n;i++){
      let total=0; const ws=work.map(x=>{const w=weight(x);total+=w;return w;});
      let r=Math.random()*total, pick=0;
      for (let j=0;j<work.length;j++){ r-=ws[j]; if(r<=0){pick=j;break;} }
      chosen.push(work[pick]); work.splice(pick,1);
    }
    return chosen.map(x=>({ ...x.q, _sheet:x.sheet, _sid:x.sid, _qidx:x.idx, _lines:splitClues(x.q.text) }));
  }

  function updateMastery(p, sid, idx, gotRight, attemptsThisQ){
    const m = getMastery(p, sid, idx);
    p.tick = (p.tick||0) + 1;
    m.seen += 1; m.attempts += 1; m.lastTick = p.tick;
    if (gotRight){
      m.correct += 1;
      // promotion depends on how many tries it took
      if (attemptsThisQ<=1) m.box = Math.min(5, m.box+ (m.box>=3?1:2)); // cold-correct jumps fast
      else m.box = Math.min(5, m.box+1);
    } else {
      m.box = 1; // any miss drops to weakest (but not 0/new)
    }
  }
  function masteryStats(p, scope){
    let total=0, mastered=0, weak=0, seen=0, sumBox=0;
    BANK.sheets.forEach(s=>{
      if (scope!=='both' && s.id!==scope) return;
      s.questions.forEach((q,idx)=>{
        const m=getMastery(p,s.id,idx); total++;
        if(m.box>=5)mastered++; if(m.box>=1&&m.box<=2)weak++; if(m.seen>0)seen++; sumBox+=m.box;
      });
    });
    return { total, mastered, weak, seen, avg: total?sumBox/total:0 };
  }

  function splitClues(text){ const p=text.match(/[^.!?]+[.!?]+(\s|$)/g)||[text]; return p.map(s=>s.trim()).filter(Boolean); }
  function normalize(s){
    return (s||'').toLowerCase()
      .replace(/\(.*?\)/g,' ')                                  // drop parenthetical alt names
      .replace(/[^a-z0-9 ]/g,' ')                               // punctuation -> space
      .replace(/\b(the|a|an|of|this|these|is|are|to|and|or|in|on|for|with|named?|called)\b/g,' ')
      .replace(/\s+/g,' ').trim();
  }
  // crude singular/stem so "chromosomes" == "chromosome", "calories" == "calorie"
  function stem(w){
    if(w.length<=3) return w;
    if(w.endsWith('ies')) return w.slice(0,-3)+'y';
    if(w.endsWith('es')&&w.length>4) return w.slice(0,-2);
    if(w.endsWith('s')&&!w.endsWith('ss')) return w.slice(0,-1);
    return w;
  }
  function stemPhrase(s){ return normalize(s).split(' ').filter(Boolean).map(stem).join(' '); }
  // Levenshtein edit distance for typo tolerance
  function editDist(a,b){
    if(a===b) return 0;
    const m=a.length,n=b.length; if(!m)return n; if(!n)return m;
    let prev=Array.from({length:n+1},(_,i)=>i), cur=new Array(n+1);
    for(let i=1;i<=m;i++){ cur[0]=i;
      for(let j=1;j<=n;j++){ const cost=a[i-1]===b[j-1]?0:1; cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+cost); }
      [prev,cur]=[cur,prev];
    }
    return prev[n];
  }
  // typo-tolerant: allow ~1 edit per 5 chars (min 1) for words length >=4
  function closeEnough(a,b){
    if(a===b) return true;
    const L=Math.max(a.length,b.length);
    if(L<4) return false;
    const tol=Math.max(1, Math.floor(L/5));
    return editDist(a,b)<=tol;
  }
  // very common words that must never, alone, carry a multi-word answer
  const WEAK_WORDS = new Set(['cell','acid','vitamin','chain','reaction','disease','system','body','plant','animal','gas','wall','membrane']);
  function isMatch(t,q){
    const candidates=[q.answer,...(q.alt||[])];
    const tn=normalize(t); if(!tn) return false;
    const ts=stemPhrase(t);
    const typedWords=ts.split(' ').filter(Boolean);
    for(const cand of candidates){
      const cn=normalize(cand); if(!cn) continue;
      const cs=stemPhrase(cand);
      const candWords=cs.split(' ').filter(Boolean);
      // 1. exact (normalized) or exact after stemming
      if(tn===cn || ts===cs) return true;
      // 2. whole-phrase typo tolerance (handles misspellings like "mitochondira"),
      //    but only if every SHORT token (<=2 chars, e.g. the 'A'/'C'/'D' in vitamins) matches exactly,
      //    so "vitamin a" is never treated as a typo of "vitamin c".
      const shortTokensOk=(()=>{
        const cShort=candWords.filter(w=>w.length<=2);
        if(!cShort.length) return true;
        return cShort.every(sw=>typedWords.includes(sw));
      })();
      if(shortTokensOk && closeEnough(ts,cs)) return true;
      // 3. substring: only when the TYPED text contains the full candidate (typed is the longer one),
      //    e.g. "the golgi apparatus" contains "golgi apparatus". A short fragment of a longer
      //    answer (typing "cell" for "cell wall") must NOT pass here.
      if(ts.includes(cs) && Math.abs(ts.length-cs.length)<=10) return true;
      if(cs.includes(ts) && candWords.length===1 && Math.abs(ts.length-cs.length)<=4) return true;
      // 4. single-word answers: typed must contain a word that's close to it (typo-tolerant)
      if(candWords.length===1){

        if(key.length>=4 && typedWords.some(w=>closeEnough(w,key))) return true;
      } else {
        // 5. multi-word answers: accept if typed covers EVERY distinctive word,
        //    OR typed closely matches ANY single distinctive word (long & non-weak).
        //    "Golgi Apparatus" -> "golgi" or "apparatus" both work; weak words like
        //    "vitamin"/"cell" never carry a match on their own.
        let distinctive=candWords.filter(w=>w.length>=4 && !WEAK_WORDS.has(w));
        if(!distinctive.length) distinctive=candWords.filter(w=>w.length>=3 && !WEAK_WORDS.has(w));
        if(distinctive.length){
          const coversAll=distinctive.every(dw=>typedWords.some(w=>closeEnough(w,dw)));
          if(coversAll) return true;
          const signatures=candWords.filter(w=>w.length>=5 && !WEAK_WORDS.has(w));
          if(signatures.some(sig=>typedWords.some(w=>closeEnough(w,sig)))) return true;
        }
      }
    }
    return false;
  }

    #iac-root .authfield{text-align:left;margin-bottom:13px;}
    #iac-root .authfield label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700;display:block;margin-bottom:7px;}
    #iac-root .authfield input{width:100%;font-size:17px;padding:12px 14px;border-radius:11px;border:1px solid var(--line);background:#fff;color:var(--ink);font-family:inherit;}
    #iac-root.theme-dark .authfield input{background:color-mix(in srgb,var(--paper-2) 92%, #fff 4%);}
    #iac-root .okmsg{background:color-mix(in srgb,#2f7d54 16%, var(--paper));border:1px solid var(--green);color:var(--green-dk);border-radius:11px;padding:11px 13px;font-size:13px;margin-bottom:10px;font-weight:600;}
    #iac-root .login .av{font-size:54px;}
    #iac-root .login .pn{font-family:Georgia,serif;font-size:24px;font-weight:700;margin-top:6px;}

    #iac-root .pindot.on{background:var(--buzz);border-color:var(--buzz);}
    #iac-root .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:0 auto;}
    #iac-root .key{font-size:22px;font-weight:700;padding:16px 0;border-radius:12px;border:1px solid var(--line);background:var(--paper);cursor:pointer;font-family:inherit;transition:.1s;}
    #iac-root .key:active{transform:scale(.95);background:var(--paper-2);}
    #iac-root .key.fn{font-size:14px;color:var(--muted);}

    /* HUD */
    #iac-root .hud{display:flex;align-items:center;gap:12px;padding:12px 16px;}
    #iac-root .hud .av{font-size:30px;}
    #iac-root .hud .who{min-width:0;flex:1;}
    #iac-root .hud .who .nm{font-weight:700;font-size:15px;}
    #iac-root .hud .who .rk{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--buzz-dk);font-weight:700;}
    #iac-root .xpbar{height:7px;background:var(--paper-2);border-radius:6px;margin-top:7px;overflow:hidden;}
    #iac-root .xpfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--buzz));border-radius:6px;transition:width .5s;}
    #iac-root .daily-goal-bar{padding:8px 16px;margin-top:6px;display:flex;align-items:center;gap:12px;}
    #iac-root .dg-label{font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap;min-width:140px;}
    #iac-root .dg-track{flex:1;height:8px;background:var(--paper-2);border-radius:6px;overflow:hidden;}
    #iac-root .dg-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--green-dk));border-radius:6px;transition:width .5s;}
    #iac-root .dg-fill.done{background:linear-gradient(90deg,var(--gold),var(--gold-dk));}
    #iac-root .hud .lvl{text-align:center;}#iac-root .hud .lvl .ln{font-family:Georgia,serif;font-size:26px;font-weight:700;line-height:1;}
    #iac-root .hud .lvl .lk{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
    #iac-root .hud .flame{text-align:center;}#iac-root .hud .flame .fn{font-family:Georgia,serif;font-size:20px;font-weight:700;}
    #iac-root .hud .flame .fk{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}

    /* bottom tab bar */
    #iac-root .tabbar{position:fixed;left:0;right:0;bottom:0;background:var(--paper);border-top:1px solid var(--line);display:flex;justify-content:center;gap:4px;padding:8px 8px calc(8px + env(safe-area-inset-bottom));box-shadow:0 -6px 20px rgba(40,30,15,.08);z-index:30;}
    #iac-root .tabbar .inner{display:flex;gap:4px;width:100%;max-width:780px;}
    #iac-root .tabbtn{flex:1;background:none;border:none;cursor:pointer;font-family:inherit;padding:6px 4px;border-radius:12px;color:var(--muted);font-weight:700;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.12s;}
    #iac-root .tabbtn .ti{font-size:20px;}
    #iac-root .tabbtn[aria-pressed="true"]{color:var(--buzz);background:var(--paper-2);}

    #iac-root .modes{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
    #iac-root .modes .lbl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;}
    #iac-root .pill{border:1px solid var(--line);background:var(--paper);color:var(--ink);font-size:13px;font-weight:600;padding:7px 13px;border-radius:999px;cursor:pointer;transition:.12s;}
    #iac-root .pill[aria-pressed="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink);}

    #iac-root .row{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:18px;}
    #iac-root .ttl{font-family:Georgia,serif;font-size:18px;font-weight:700;}
    #iac-root .sheets{display:grid;gap:14px;margin-top:12px;}
    @media(min-width:560px){#iac-root .sheets{grid-template-columns:1fr 1fr;}}
    #iac-root .sheet{text-align:left;cursor:pointer;border:1px solid var(--line);background:var(--paper);border-radius:14px;padding:16px;box-shadow:0 8px 22px rgba(40,30,15,.09);transition:transform .12s,border-color .12s;}
    #iac-root .sheet:hover{transform:translateY(-2px);border-color:var(--buzz);}
    #iac-root .sheet .tag{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--buzz-dk);font-weight:800;}
    #iac-root .sheet .nm{font-family:Georgia,serif;font-size:21px;margin-top:6px;font-weight:700;}
    #iac-root .sheet .ct{color:var(--muted);font-size:13px;margin-top:8px;}
    #iac-root .mbar{height:6px;background:var(--paper-2);border-radius:5px;margin-top:12px;overflow:hidden;}
    #iac-root .mfill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:5px;}
    #iac-root .sheet .mlabel{font-size:11.5px;color:var(--green-dk);font-weight:700;margin-top:6px;}
    #iac-root .sheet .go{margin-top:10px;font-weight:700;font-size:13px;color:var(--buzz);}
    #iac-root .sheet.both{background:var(--ink);border-color:var(--ink);color:var(--paper);}
    #iac-root .sheet.both .tag{color:var(--gold);}#iac-root .sheet.both .ct{color:#bcae93;}#iac-root .sheet.both .go{color:#f0c969;}#iac-root .sheet.both .mlabel{color:#9fd3b3;}
    @media(min-width:560px){#iac-root .sheet.both{grid-column:1/-1;}}

    #iac-root .levelnote{margin-top:14px;padding:14px 16px;border-radius:12px;background:var(--paper-2);border:1px solid var(--line);font-size:13px;color:var(--ink);}
    #iac-root .levelnote b{color:var(--buzz-dk);}

    /* QUIZ */
    #iac-root .topnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    #iac-root .back{background:none;border:none;cursor:pointer;color:var(--muted);font-weight:700;font-size:13px;padding:6px 2px;font-family:inherit;}
    #iac-root .back:hover{color:var(--buzz);}
    #iac-root .crumb{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700;}#iac-root .crumb b{color:var(--ink);}
    #iac-root .barwrap{height:4px;background:var(--paper-2);border-radius:4px;margin-top:10px;overflow:hidden;}
    #iac-root .bar{height:100%;background:linear-gradient(90deg,var(--buzz),var(--gold));width:0;transition:width .3s;border-radius:4px;}
    #iac-root .scorebar{display:flex;gap:14px;align-items:center;justify-content:flex-end;margin-top:10px;}
    #iac-root .stat{text-align:center;}#iac-root .stat .n{font-family:Georgia,serif;font-size:20px;font-weight:700;line-height:1;}
    #iac-root .stat .k{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:3px;}
    #iac-root .stat.pt .n{color:var(--green-dk);}#iac-root .stat.st .n{color:var(--buzz);}
    #iac-root .card{margin-top:14px;border:1px solid var(--line);background:var(--paper);border-radius:16px;box-shadow:0 8px 22px rgba(40,30,15,.09);overflow:hidden;}
    #iac-root .card .head{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px dashed var(--line);background:var(--paper-2);}
    #iac-root .card .head .pace{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;}
    #iac-root .chip{font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:800;padding:3px 8px;border-radius:999px;}
    #iac-root .chip.new{background:#e7e0cf;color:var(--muted);}#iac-root .chip.weak{background:#f7e0d8;color:var(--buzz-dk);}
    #iac-root .chip.strong{background:#e0efe6;color:var(--green-dk);}
    #iac-root .worth{font-family:Georgia,serif;font-weight:700;font-size:15px;}#iac-root .worth b{color:var(--green-dk);}
    #iac-root .clues{padding:20px 20px 8px;}
    #iac-root .clue{font-size:18.5px;line-height:1.5;margin:0 0 12px;padding-left:16px;border-left:3px solid var(--gold);opacity:0;transform:translateY(4px);animation:clueIn .3s ease forwards;}
    #iac-root .clue.tag-line{border-left-color:var(--buzz);font-weight:600;}
    #iac-root .hiddencount{color:var(--muted);font-size:13px;padding:0 20px 4px;font-style:italic;}
    #iac-root .answerbox{padding:6px 20px 4px;}
    #iac-root .answerbox input{width:100%;font-size:17px;padding:13px 14px;border-radius:11px;border:1px solid var(--line);background:#fff;color:var(--ink);font-family:inherit;}
    #iac-root .answerbox input:focus{outline:3px solid rgba(214,69,31,.35);border-color:var(--buzz);}
    #iac-root .reveal{margin:10px 20px 4px;border-radius:12px;padding:14px 16px;border:1px solid var(--line);animation:fade .25s;}
    #iac-root .reveal.right{background:#e7f1ea;border-color:#aacdb8;}#iac-root .reveal.wrong{background:#f7e7e1;border-color:#e0b3a3;}
    #iac-root .reveal .v{font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:800;}
    #iac-root .reveal.right .v{color:var(--green-dk);}#iac-root .reveal.wrong .v{color:var(--buzz-dk);}
    #iac-root .reveal .ans{font-family:Georgia,serif;font-size:26px;font-weight:700;margin-top:4px;}
    #iac-root .reveal .accept{font-size:12.5px;color:var(--muted);margin-top:6px;}
    #iac-root .reveal .scored{font-size:13px;margin-top:8px;font-weight:700;color:var(--green-dk);}
    #iac-root .reveal .mv{font-size:12px;margin-top:6px;color:var(--muted);font-weight:600;}
    #iac-root .actions{display:flex;gap:10px;flex-wrap:wrap;padding:14px 20px 8px;}
    #iac-root .btn{cursor:pointer;border:none;border-radius:11px;font-family:inherit;font-weight:700;font-size:15px;padding:13px 18px;transition:transform .1s,filter .12s;flex:1;min-width:130px;}
    #iac-root .btn:active{transform:translateY(1px);}
    #iac-root .btn.buzz{background:var(--buzz);color:#fff;box-shadow:0 3px 0 var(--buzz-dk);}
    #iac-root .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);}
    #iac-root .btn.next{background:var(--ink);color:var(--paper);}
    #iac-root .btn.judge-r{background:var(--green);color:#fff;box-shadow:0 3px 0 var(--green-dk);}
    #iac-root .btn.judge-w{background:#fff;color:var(--buzz-dk);border:1px solid #e0b3a3;}
    #iac-root .btn.sm{flex:0 0 auto;min-width:0;font-size:13px;padding:9px 14px;}
    #iac-root .hint{text-align:center;font-size:12px;color:var(--muted);padding:0 20px 16px;}

    #iac-root .levelup{margin:14px 0;border-radius:16px;padding:20px;text-align:center;color:#1c1303;background:linear-gradient(110deg,#f0d27a,#e7b53f);background-size:200% 100%;animation:shine 1.6s ease,pop .4s ease;border:1px solid var(--gold-dk);}
    #iac-root .levelup .lt{font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:800;}
    #iac-root .levelup .lv{font-family:Georgia,serif;font-size:30px;font-weight:700;margin-top:4px;}

    /* SUMMARY */
    #iac-root .summary{margin-top:14px;padding:26px 22px;text-align:center;}
    #iac-root .summary .big{font-family:Georgia,serif;font-size:52px;font-weight:700;line-height:1;}
    #iac-root .summary .big .slash{color:var(--muted);font-size:30px;}
    #iac-root .summary .label{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:8px;}
    #iac-root .sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:22px;}
    #iac-root .sgrid .cell{border:1px solid var(--line);border-radius:12px;padding:12px 6px;background:var(--paper-2);}
    #iac-root .sgrid .cell .n{font-family:Georgia,serif;font-size:22px;font-weight:700;}#iac-root .sgrid .cell .k{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
    #iac-root .earned{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
    #iac-root .earned .e{display:flex;align-items:center;gap:8px;background:linear-gradient(90deg,#f4e3ad,#ecca6a);border:1px solid var(--gold-dk);border-radius:999px;padding:7px 13px;font-weight:700;font-size:13px;color:#1c1303;animation:pop .35s;}
    #iac-root .missed{text-align:left;margin-top:22px;}#iac-root .missed h3{font-family:Georgia,serif;font-size:16px;margin:0 0 10px;}
    #iac-root .missed .m{font-size:14px;padding:8px 0;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;}
    #iac-root .missed .m b{color:var(--buzz-dk);white-space:nowrap;}
    #iac-root .sumbtns{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap;}

    /* MISTAKES tab */
    #iac-root .mlist{margin-top:14px;}
    #iac-root .mitem{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);background:var(--paper);border-radius:12px;margin-bottom:8px;}
    #iac-root .mitem .dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;}
    #iac-root .mitem .nm{font-weight:700;flex:1;}
    #iac-root .mitem .bx{font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;color:var(--muted);}
    #iac-root .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:15px;}

    /* ACCOUNT */
    #iac-root .acctgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
    #iac-root .acel{border:1px solid var(--line);background:var(--paper);border-radius:12px;padding:14px;}
    #iac-root .acel .n{font-family:Georgia,serif;font-size:24px;font-weight:700;}#iac-root .acel .k{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
    #iac-root .shelf{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
    @media(min-width:560px){#iac-root .shelf{grid-template-columns:repeat(4,1fr);}}
    #iac-root .badge{border:1px solid var(--line);background:var(--paper);border-radius:14px;padding:14px 8px;text-align:center;}

    #iac-root .cloudrow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:8px 0 4px;padding:9px 13px;border:1px solid var(--line);background:var(--paper-2);border-radius:11px;font-size:13px;}

    #iac-root .syncbadge.saved{color:var(--green-dk);}
    #iac-root .syncbadge.error{color:var(--buzz-dk);}
    #iac-root .btn.danger{color:var(--buzz-dk);border-color:color-mix(in srgb,var(--buzz) 45%, var(--line));}
    #iac-root .btn.danger:hover{background:color-mix(in srgb,var(--buzz) 12%, transparent);}

    /* coins */
    #iac-root .coinrow{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
    #iac-root .coinpill{background:linear-gradient(90deg,#f4e3ad,#ecca6a);border:1px solid var(--gold-dk);color:#1c1303;font-weight:800;font-size:13px;padding:7px 13px;border-radius:999px;}
    #iac-root .coinpill.ghost{background:var(--paper-2);border-color:var(--line);color:var(--muted);}

    /* opponents strip */
    #iac-root .botstrip{margin-top:18px;border:1px solid var(--line);background:var(--paper);border-radius:14px;padding:14px 16px;box-shadow:0 8px 22px rgba(40,30,15,.07);}

    #iac-root .botchip{text-align:center;}
    #iac-root .botchip .ba{font-size:30px;}
    #iac-root .botchip .bn{font-size:11px;font-weight:700;color:var(--muted);margin-top:2px;}

    /* race lineup (4 buzzers) */

    #iac-root .buzzer{border:1px solid var(--line);background:var(--paper);border-radius:12px;padding:10px 6px;text-align:center;transition:.18s;position:relative;}

    /* standings */

    #iac-root .standrow .pos{font-size:16px;width:24px;}
    #iac-root .standrow .sa{font-size:22px;}
    #iac-root .standrow .sn{flex:1;font-weight:700;}
    #iac-root .standrow .ss{font-family:Georgia,serif;font-size:20px;font-weight:700;}

    /* shop */
    #iac-root .shopgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
    @media(min-width:560px){#iac-root .shopgrid{grid-template-columns:repeat(3,1fr);}}
    #iac-root .shopcard{border:1px solid var(--line);background:var(--paper);border-radius:14px;padding:16px 12px;text-align:center;box-shadow:0 6px 16px rgba(40,30,15,.06);display:flex;flex-direction:column;align-items:center;gap:6px;}

    #iac-root .shopcard .sw{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid var(--line);}
    #iac-root .wpreview{position:relative;width:100%;height:64px;border-radius:12px;overflow:hidden;border:1px solid var(--line);}
    #iac-root .wpreview .wdot{position:absolute;right:8px;bottom:8px;width:14px;height:14px;border-radius:50%;box-shadow:0 0 10px currentColor;}

  const rootEl=document.getElementById('iac-root');

  /* =========================================================
     SOUND ENGINE — WebAudio blips, no external files.
     Muted state lives on the store so it persists.
     ========================================================= */
  if (store.muted===undefined){ store.muted=false; persist(); }
  let AC=null;
  function audio(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=null; } } return AC; }
  function blip(freq, dur, type, vol, slideTo){
    if(store.muted) return;
    const ac=audio(); if(!ac) return;
    if(ac.state==='suspended') ac.resume();
    const o=ac.createOscillator(), g=ac.createGain();
    o.type=type||'sine'; o.frequency.value=freq;
    if(slideTo){ o.frequency.exponentialRampToValueAtTime(slideTo, ac.currentTime+dur); }
    g.gain.setValueAtTime(0.0001, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(vol||0.18, ac.currentTime+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+dur);
    o.connect(g); g.connect(ac.destination);
    o.start(); o.stop(ac.currentTime+dur+0.02);
  }
  function chord(freqs, dur, type, vol){ freqs.forEach((f,i)=>setTimeout(()=>blip(f,dur,type,vol),i*70)); }
  const SFX={
    tap:   ()=>blip(420,0.05,'triangle',0.08),
    buzz:  ()=>{ blip(180,0.18,'square',0.16,90); haptic(20); },
    correct:()=>{ chord([523,659,784],0.22,'sine',0.16); haptic(15); },
    wrong: ()=>{ blip(220,0.28,'sawtooth',0.13,110); haptic([30,40,30]); },
    coin:  ()=>blip(880,0.09,'square',0.12,1320),
    level: ()=>chord([523,659,784,1047],0.32,'sine',0.18),
    win:   ()=>chord([523,659,784,1047,1319],0.40,'triangle',0.18),
    lose:  ()=>chord([392,330,262],0.34,'sine',0.14),
    badge: ()=>chord([784,988,1319],0.3,'triangle',0.17),
    tick:  ()=>blip(640,0.04,'sine',0.06),
  };
  function sfx(name){ const f=SFX[name]; if(f)f(); }
  function haptic(pattern){ try{ if(navigator.vibrate && !store.muted) navigator.vibrate(pattern); }catch(e){} }
  function toggleMute(){ store.muted=!store.muted; persist(); if(!store.muted) sfx('tap'); }

  /* =========================================================
     CONFETTI — lightweight DOM burst
     ========================================================= */
  function confetti(opts){
    opts=opts||{};
    const n=opts.count||80;
    const colors=['#d6451f','#c79a3a','#2f7d54','#e7b53f','#ff5fa2','#5fd0c8','#f0d27a'];
    const burst=document.createElement('div'); burst.className='confetti-burst'; fxLayer.appendChild(burst);
    for(let i=0;i<n;i++){
      const p=document.createElement('i');
      const left=50+(Math.random()*60-30);
      const delay=Math.random()*0.25;
      const dur=1.6+Math.random()*1.3;
      const size=6+Math.random()*8;
      const rot=Math.random()*360;
      const drift=(Math.random()*2-1)*160;
      p.style.cssText=`left:${left}%;width:${size}px;height:${size*0.6}px;background:${colors[i%colors.length]};animation-delay:${delay}s;animation-duration:${dur}s;--drift:${drift}px;--rot:${rot}deg;`;
      burst.appendChild(p);
    }
    setTimeout(()=>burst.remove(),3400);
  }

  /* =========================================================
     ANIMATED COUNTER — tick a number up; call after render
     ========================================================= */
  function animateCount(el, from, to, dur, prefix){
    if(!el) return; dur=dur||700; prefix=prefix||'';
    const start=performance.now(); const diff=to-from;
    function step(now){
      const t=Math.min(1,(now-start)/dur);
      const eased=1-Math.pow(1-t,3); // easeOutCubic
      el.textContent=prefix+Math.round(from+diff*eased);
      if(t<1) requestAnimationFrame(step);
      else el.textContent=prefix+to;
    }
    requestAnimationFrame(step);
  }

  // Combo text — "3x STREAK!" overlay that pulses and fades
  function comboOverlay(streak){
    if(streak<2) return;
    const el=document.createElement('div');
    const isFire=streak>=5, isMega=streak>=10;
    el.className='combo-text'+(isMega?' mega':isFire?' fire':'');
    if(isMega) el.textContent=streak+'x UNSTOPPABLE!';
    else if(isFire) el.textContent=streak+'x ON FIRE!';
    else el.textContent=streak+'x STREAK!';
    rootEl.appendChild(el);
    setTimeout(()=>el.remove(), 1000);
  }

    if(currentStreak>1 && currentStreak===p.bestStreakEver && currentStreak>=(q._pbAtStart||0)+1){

  function toast(text,isBadge,icon){
    const t=document.createElement('div'); t.className='toast'+(isBadge?' badge':'');
    t.innerHTML=isBadge?`<span class="ti">${icon}</span> Badge: ${text}`:text; toastLayer.appendChild(t);

  }
  function awardBadges(p,ids){ const got=[]; ids.forEach(id=>{ if(!id||p.badges[id])return; p.badges[id]=todayStr(); const b=BADGES.find(x=>x.id===id); if(b)got.push(b); }); if(got.length)sfx('badge'); return got; }

  /* =========================================================
     ROUTER
     ========================================================= */
  let view='welcome';    // welcome | gate | login | newplayer | tab
  let activeTab='play';  // play | practice | mistakes | shop | account

  /* ---------- WELCOME (Log in vs Create account) ---------- */
  function renderWelcome(){

  /* ---------- CLOUD AUTH SCREENS (email + password + reset) ---------- */
  let authEmail='', authPass='', authName='', authErr='', authMsg='', authBusy=false;
  function strongPassword(pw){ return (pw||'').length>=8; }
  function validEmail(e){ return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test((e||'').trim()); }

  function renderCloudLogin(){
    app.innerHTML=`<div class="wrap">
      <div class="topnav"><button class="back" id="back">← Back</button><div class="crumb">Log in ☁️</div></div>
      <div class="login card-base">

      </div>
    </div>`;
    app.querySelector('#back').onclick=()=>{ view='welcome'; render(); };
    const eE=app.querySelector('#aEmail'), eP=app.querySelector('#aPass');
    eE.oninput=e=>{authEmail=e.target.value;authErr='';};
    eP.oninput=e=>{authPass=e.target.value;authErr='';};
    eP.onkeydown=e=>{ if(e.key==='Enter'){ e.preventDefault(); doCloudLogin(); } };
    app.querySelector('#aGo').onclick=doCloudLogin;
    app.querySelector('#aForgot').onclick=()=>{ authErr='';authMsg=''; view='forgot'; render(); };
  }
  async function doCloudLogin(){
    authEmail=(app.querySelector('#aEmail')||{}).value||authEmail;
    authPass=(app.querySelector('#aPass')||{}).value||authPass;
    if(!validEmail(authEmail)){ authErr='Enter a valid email'; render(); return; }
    if(!authPass){ authErr='Enter your password'; render(); return; }
    authBusy=true; authErr=''; render();
    const { data, error } = await Cloud.signIn(authEmail.trim(), authPass);
    authBusy=false;
    if(error){ authErr=error.message||'Could not log in'; sfx('wrong'); render(); return; }
    const user = data && data.user;
    if(!user){ authErr='Could not log in'; render(); return; }
    sfx('correct');
    await enterCloudUser(user);
  }

  function renderCloudSignup(){
    const pwOk=strongPassword(authPass);
    app.innerHTML=`<div class="wrap">
      <div class="topnav"><button class="back" id="back">← Back</button><div class="crumb">Create account ☁️</div></div>
      <div class="login card-base">

        <div class="authfield">
          <label>Email</label>
          <input id="aEmail" type="email" autocomplete="email" autocapitalize="off" spellcheck="false" placeholder="you@example.com" value="${(authEmail||'').replace(/"/g,'&quot;')}" />

          <label>Password <span id="pwHint" style="color:${pwOk?'var(--green)':'var(--muted)'};font-weight:600;">(at least 8 characters)</span></label>
          <input id="aPass" type="password" autocomplete="new-password" placeholder="Make it strong" value="${(authPass||'').replace(/"/g,'&quot;')}" />
        </div>
        <div class="err">${authErr}</div>
        <div class="actions" style="padding-top:4px;"><button class="btn buzz" id="aGo" ${authBusy?'disabled':''}>${authBusy?'Creating…':'Create account'}</button></div>
        <div class="muted-note" style="text-align:center;margin-top:6px;">If you ever forget your password, you can reset it from the login screen using your email.</div>
      </div>
    </div>`;
    app.querySelector('#back').onclick=()=>{ view='welcome'; render(); };
    const eN=app.querySelector('#aName'), eE=app.querySelector('#aEmail'), eP=app.querySelector('#aPass');
    eN.oninput=e=>{authName=e.target.value;authErr='';};
    eE.oninput=e=>{authEmail=e.target.value;authErr='';};
    // No re-render while typing (that caused the flicker). Just recolor the hint live.
    eP.oninput=e=>{
      authPass=e.target.value; authErr='';
      const hint=app.querySelector('#pwHint');
      if(hint) hint.style.color = strongPassword(authPass) ? 'var(--green)' : 'var(--muted)';
    };
    eP.onkeydown=e=>{ if(e.key==='Enter'){ e.preventDefault(); doCloudSignup(); } };
    app.querySelector('#aGo').onclick=doCloudSignup;
  }
  async function doCloudSignup(){
    authName=(app.querySelector('#aName')||{}).value||authName;
    authEmail=(app.querySelector('#aEmail')||{}).value||authEmail;
    authPass=(app.querySelector('#aPass')||{}).value||authPass;
    if(!(authName||'').trim()){ authErr='Pick a display name'; render(); return; }
    if(!validEmail(authEmail)){ authErr='Enter a valid email'; render(); return; }
    if(!strongPassword(authPass)){ authErr='Password must be at least 8 characters'; render(); return; }
    authBusy=true; authErr=''; render();
    const { data, error } = await Cloud.signUp(authEmail.trim(), authPass, authName.trim());
    authBusy=false;
    if(error){ authErr=error.message||'Could not create account'; sfx('wrong'); render(); return; }
    // With "Confirm email" OFF, a session is returned and we can log straight in.
    const user = data && data.user;
    if(data && data.session && user){
      sfx('correct'); await enterCloudUser(user); return;
    }
    // If confirm-email is ON, there's no session yet. Show a clear "check your email" screen.
    authMsg='';
    view='checkmail'; authErr=''; render();
  }

  function renderCheckMail(){

  function handleKey(k){

    if(k==='del'){ pinBuf=pinBuf.slice(0,-1); sfx('tap'); }

  function submitPin(){
    const nm=app.querySelector('#loginName'); if(nm) loginName=nm.value;

    if(!name){ loginErr='Enter your account name'; render(); return; }
    if(pinBuf.length<4){ loginErr='Enter your 4-digit PIN'; render(); return; }
    // look up by name (case-insensitive) AND verify PIN together, revealing nothing either way
    const p=store.players.find(x=>x.name.toLowerCase()===name.toLowerCase());
    if(p && hash(pinBuf)===p.pinHash){ pinBuf=''; loginErr=''; sfx('correct'); enterPlayer(p); }

  function deleteAccountFlow(){
    const p=currentPlayer(); if(!p)return;
    const label=p.name||'this account';
    const warn=CLOUD_ON
      ? `Delete "${label}"?\n\nThis erases all progress (XP, coins, mastery, badges) on this device and signs you out.\n\nNote: to fully remove your login email from the cloud, also delete it in your Supabase dashboard under Authentication > Users.\n\nType DELETE to confirm.`
      : `Delete "${label}"?\n\nThis permanently erases the account and all its progress on this device. This cannot be undone.\n\nType DELETE to confirm.`;
    const ans=prompt(warn);
    if(ans===null)return;
    if(ans.trim().toUpperCase()!=='DELETE'){ acctMsg='Account not deleted (you must type DELETE).'; renderAccount(); return; }

  }

    if(CLOUD_ON){ try{ await Cloud.signOut(); }catch(e){} }

  /* ---------- COIN HELPER ---------- */
  function addCoins(p, n){ p.coins=(p.coins||0)+n; }

  /* =========================================================
     PLAY TAB — 4-buzzer race vs bots
     ========================================================= */
  function renderPlay(){
    const p=currentPlayer();

  /* =========================================================
     RACE ENGINE
     ========================================================= */
  function startRace(arena){
    const p=currentPlayer();
    // build the deck: full set(s), in order, but capped so a race is ~12 Qs/round
    function roundDeck(sid, n){
      const s=BANK.sheets.find(x=>x.id===sid);
      return shuffle(s.questions.map((qq,idx)=>({...qq,_sheet:s.name,_sid:s.id,_qidx:idx,_lines:splitClues(qq.text)}))).slice(0,n);
    }
    let deck=[], rounds=[];
    if(arena==='gauntlet'){
      // pull a few from every subject, shuffle into one mixed gauntlet
      let mixed=[];
      BANK.sheets.forEach(s=>{
        const picks=shuffle(s.questions.map((qq,idx)=>({...qq,_sheet:s.name,_sid:s.id,_qidx:idx,_lines:splitClues(qq.text)}))).slice(0,2);
        mixed=mixed.concat(picks);
      });
      deck=shuffle(mixed).slice(0,15);
      rounds=[{name:'Gauntlet',end:deck.length}];
    } else {
      const s=BANK.sheets.find(x=>x.id===arena);
      deck=roundDeck(arena,12);
      rounds=[{name:s?s.name:'Race',end:deck.length}];
    }
    race={
      arena, deck, rounds, idx:0,
      bots: BOT_ROSTER.map(b=>({...b, score:0})),
      me:{score:0},
      wins:0,           // YOUR correct buzzes (drives ramp)
      ramp:0,
      revealedLines:1, phase:'reading', // reading | answering | resolved
      typed:'', botBuzzed:null, botTimer:null, tickTimer:null,
      questionStart:0, frozenUntil:0,
      answerDeadline:0, answerTimer:null, answerLeft:0,
      lastResult:null, beatenThisQ:0,
      powerUsedTime:false, shieldArmed:false, doubleNext:false, slowmoThisQ:false,
      _pbAtStart: currentPlayer().bestStreakEver||0,
    };
    subView='race'; render();
    beginQuestion();
  }

  function clearRaceTimers(){
    if(race.botTimer){clearTimeout(race.botTimer);race.botTimer=null;}
    if(race.tickTimer){clearInterval(race.tickTimer);race.tickTimer=null;}
    if(race.answerTimer){clearInterval(race.answerTimer);race.answerTimer=null;}
  }

  function beginQuestion(){
    const qq=race.deck[race.idx];
    race.revealedLines=1; race.phase='reading'; race.typed=''; race.botBuzzed=null;
    race.lastResult=null; race.beatenThisQ=0; race.powerUsedTime=false; race.slowmoThisQ=false;
    race.questionStart=Date.now();
    clearRaceTimers();
    // decide each bot's plan for THIS question (which clue they'll pounce on, and if they know it)
    planBotsForQuestion();
    // auto-reveal one clue every 15s; check bot buzz each time the board changes
    scheduleBotBuzz();
    race.tickTimer=setInterval(()=>{
      if(race.phase!=='reading'){ return; }
      if(race.revealedLines < qq._lines.length){
        race.revealedLines++; renderRace();
        scheduleBotBuzz(); // a new clue is up — a bot may now be willing to buzz
      } else {
        clearInterval(race.tickTimer); race.tickTimer=null;
        scheduleBotBuzz(); // all clues read — bots that waited for the end can now go
      }
    }, CLUE_INTERVAL);
    render();
    const inp=app.querySelector('#raceans'); if(inp)inp.focus();
  }

  // pick which bots "know" this question and the earliest clue each will buzz on
  function planBotsForQuestion(){
    const qq=race.deck[race.idx];
    const total=qq._lines.length; const ramp=race.ramp;
    race._botPlan = race.bots.map(b=>{
      const pr=botParams(b,ramp,total);
      const knows=Math.random()<pr.acc;
      return { bot:b, knows, patienceClue:pr.patienceClue, grace:pr.grace, fired:false };
    });
  }

  function scheduleBotBuzz(){
    if(!race._botPlan) return;
    if(race.botTimer){ clearTimeout(race.botTimer); race.botTimer=null; }
    if(race.phase!=='reading') return;
    const shown=race.revealedLines;
    // among bots who know it and whose patience-clue is now visible, pick the soonest to fire
    let soonest=null;
    race._botPlan.forEach(plan=>{
      if(plan.fired || !plan.knows) return;
      if(shown < plan.patienceClue) return; // not enough clues up yet for this bot
      let delay=plan.grace;
      if(race.slowmoThisQ) delay*=2; // 🐌 Slow Bots
      if(!soonest || delay<soonest.delay) soonest={plan,delay};
    });
    if(!soonest) return;
    const fire=()=>{
      const now=Date.now();
      if(now < race.frozenUntil){ race.botTimer=setTimeout(fire, race.frozenUntil-now+50); return; }
      if(race.phase!=='reading') return;
      soonest.plan.fired=true;
      botTakesQuestion(soonest.plan.bot);
    };
    race.botTimer=setTimeout(fire, soonest.delay);
  }

  function botTakesQuestion(bot){
    clearRaceTimers();
    const qq=race.deck[race.idx];
    bot.score+=1;
    race.phase='resolved';
    race.lastResult={ who:'bot', bot, answer:qq.answer };
    // update YOUR mastery softly: a bot stealing it means you didn't know it fast -> mark shaky if unseen
    sfx('lose'); haptic([20,30,20]);
    render();
  }

  // Step 1: player hits BUZZ — claim the question, freeze bots, start a 10s answer timer
  function playerBuzz(){
    if(race.phase!=='reading')return;
    clearRaceTimers();                 // stop bot buzz + clue auto-reveal
    sfx('buzz');
    race.phase='answering';
    race.answerLeft=10;
    race.answerDeadline=Date.now()+10000;
    race.answerTimer=setInterval(()=>{
      const left=Math.ceil((race.answerDeadline-Date.now())/1000);
      if(left!==race.answerLeft){ race.answerLeft=Math.max(0,left); if(left<=3&&left>0)sfx('tick'); updateAnswerTimerUI(); }
      if(Date.now()>=race.answerDeadline){ clearInterval(race.answerTimer); race.answerTimer=null; confirmAnswer(true); }
    }, 200);
    render();
    const inp=app.querySelector('#raceans'); if(inp)inp.focus();
  }

  // Step 2: grade what was typed (called on Enter/Lock-in, or auto when the 10s runs out)
  function confirmAnswer(timedOut){
    if(race.phase!=='answering')return;
    clearRaceTimers();
    const qq=race.deck[race.idx]; const typed=(race.typed||'').trim();
    const p=currentPlayer();
    if(typed && isMatch(typed,qq)){
      race.phase='resolved';
      race.me.score+=1; race.wins+=1; race.ramp+=1;
      const early=race.revealedLines<qq._lines.length;
      let coins = 5 + (early?3:0) + Math.floor(race.ramp/3);
      if(race.doubleNext){ coins*=2; race.doubleNext=false; }
      addCoins(p, coins);
      updateMastery(p, qq._sid, qq._qidx, true, early?1:2);
      race.lastResult={ who:'me', answer:qq.answer, coins, early };
      sfx('correct'); setTimeout(()=>sfx('coin'),180);
      floatXP('+'+coins+' 🪙', true);
      if(race.wins>=2) comboOverlay(race.wins);
      touchDailyGoal(p);
      persist(); render();
    } else if(race.shieldArmed){
      // shield absorbs the miss: no point lost, no bot scoop, retry-free skip
      race.shieldArmed=false;
      race.phase='resolved';
      race.lastResult={ who:'shield', answer:qq.answer };
      sfx('tap'); toast('🛡️ Shield saved you');
      persist(); render();
    } else {
      race.phase='resolved';
      updateMastery(p, qq._sid, qq._qidx, false, 2);
      const ramp=race.ramp; let taker=null;
      race.bots.forEach(b=>{ const pr=botParams(b,ramp); if(Math.random()<pr.acc+0.1){ if(!taker||Math.random()<0.5)taker=b; } });
      if(taker)taker.score+=1;
      race.lastResult={ who:'wrong', answer:qq.answer, taker, timedOut:!!timedOut };
      sfx('wrong'); screenShake();
      persist(); render();
    }
  }

  // lightweight update of just the countdown number without a full re-render (keeps input focused)
  function updateAnswerTimerUI(){
    const el=app.querySelector('#answerclock'); if(el){ el.textContent=race.answerLeft+'s'; if(race.answerLeft<=2)el.classList.add('low'); }
    const ring=app.querySelector('#answerring'); if(ring){ ring.style.width=(race.answerLeft/10*100)+'%'; }
  }

  function raceReveal(){
    if(race.phase!=='reading')return;
    const qq=race.deck[race.idx];
    if(race.revealedLines<qq._lines.length){ race.revealedLines++; renderRace(); scheduleBotBuzz(); const i=app.querySelector('#raceans'); if(i)i.focus(); }
  }

  function useFreeze(){
    const p=currentPlayer();
    if((p.powerups.freeze||0)<=0){ toast('No Freeze — buy in Shop'); return; }
    p.powerups.freeze-=1; race.frozenUntil=Date.now()+3000; persist();
    sfx('tap'); toast('🧊 Bots frozen for 3s'); renderRace();
    const i=app.querySelector('#raceans'); if(i)i.focus();
  }
  function useTime(){
    const p=currentPlayer();
    if((p.powerups.time||0)<=0){ toast('No Extra Time — buy in Shop'); return; }
    if(race.phase==='answering'){
      // extend the answer countdown by 4s
      p.powerups.time-=1; race.answerDeadline+=4000; race.answerLeft=Math.ceil((race.answerDeadline-Date.now())/1000);
      persist(); sfx('tap'); toast('⏱️ +4s to answer'); updateAnswerTimerUI();
    } else {
      // push the bots' buzz back 4s
      p.powerups.time-=1; race.frozenUntil=Math.max(race.frozenUntil,Date.now()+4000);
      if(race.botTimer){ clearTimeout(race.botTimer); scheduleBotBuzz(); }
      persist(); sfx('tap'); toast('⏱️ Bots delayed 4s'); renderRace();
      const i=app.querySelector('#raceans'); if(i)i.focus();
    }
  }
  function useFifty(){
    const p=currentPlayer();
    if((p.powerups.fifty||0)<=0){ toast('No Bonus Clue — buy in Shop'); return; }
    p.powerups.fifty-=1; persist(); sfx('tap'); raceReveal(); toast('➗ Bonus clue');
  }
  function useShield(){
    const p=currentPlayer();
    if(race.shieldArmed){ toast('🛡️ Shield already armed'); return; }
    if((p.powerups.shield||0)<=0){ toast('No Shield — buy in Shop'); return; }
    p.powerups.shield-=1; race.shieldArmed=true; persist(); sfx('tap'); toast('🛡️ Shield armed — a wrong answer is free'); renderRace();
    const i=app.querySelector('#raceans'); if(i)i.focus();
  }
  function useDouble(){
    const p=currentPlayer();
    if(race.doubleNext){ toast('✨ Double already armed'); return; }
    if((p.powerups.double||0)<=0){ toast('No Double Coins — buy in Shop'); return; }
    p.powerups.double-=1; race.doubleNext=true; persist(); sfx('coin'); toast('✨ Next correct buzz = 2x coins'); renderRace();
    const i=app.querySelector('#raceans'); if(i)i.focus();
  }
  function useHint(){
    const p=currentPlayer();
    if((p.powerups.hint||0)<=0){ toast('No First Letter — buy in Shop'); return; }
    const qq=race.deck[race.idx];
    const letter=(qq.answer||'?').trim().charAt(0).toUpperCase();
    p.powerups.hint-=1; persist(); sfx('tap'); toast('💡 Starts with "'+letter+'"');
    const i=app.querySelector('#raceans'); if(i)i.focus();
  }
  function useSteal(){
    const p=currentPlayer();
    if((p.powerups.steal||0)<=0){ toast('No Steal — buy in Shop'); return; }
    // take a point from the leading bot (if any have points)
    const lead=race.bots.filter(b=>b.score>0).sort((a,b)=>b.score-a.score)[0];
    if(!lead){ toast('No bot has points to steal yet'); return; }
    p.powerups.steal-=1; lead.score-=1; race.me.score+=1; persist();
    sfx('coin'); toast('⚡ Stole a point from '+lead.name); renderRace();
    const i=app.querySelector('#raceans'); if(i)i.focus();
  }
  function useSlowmo(){
    const p=currentPlayer();
    if((p.powerups.slowmo||0)<=0){ toast('No Slow Bots — buy in Shop'); return; }
    if(race.phase!=='reading'){ toast('Use Slow Bots before you buzz'); return; }
    p.powerups.slowmo-=1; race.slowmoThisQ=true;
    // reschedule the bot buzz at half speed
    if(race.botTimer){ clearTimeout(race.botTimer); scheduleBotBuzz(); }
    persist(); sfx('tap'); toast('🐌 Bots slowed this question'); renderRace();
    const i=app.querySelector('#raceans'); if(i)i.focus();
  }

  function raceNext(){
    race.idx++;
    if(race.idx>=race.deck.length){ finishRace(); return; }
    beginQuestion();
  }

  function finishRace(){
    clearRaceTimers();
    const p=currentPlayer();
    // standings
    const standings=[{name:p.name,avatar:p.avatar,score:race.me.score,me:true}]
      .concat(race.bots.map(b=>({name:b.name,avatar:b.avatar,score:b.score,me:false})))
      .sort((a,b)=>b.score-a.score);
    const myRank=standings.findIndex(s=>s.me)+1;
    const botsBeaten=race.bots.filter(b=>race.me.score>b.score).length;
    const won=myRank===1;
    // rewards
    let bonus=0;
    if(won){ bonus=50; }
    bonus += botsBeaten*10;
    addCoins(p,bonus);
    if(won)p.racesWon=(p.racesWon||0)+1;
    p.bestRace=Math.max(p.bestRace||0, race.me.score);
    // XP for the run
    p.xp += race.me.score*8;
    // badges
    const nb=[];
    if(won)nb.push('first_win');
    if(botsBeaten>=3)nb.push('beat3');
    if(won && race.ramp>=8)nb.push('beat4');
    const got=awardBadges(p,nb); persist();
    race._standings=standings; race._myRank=myRank; race._bonus=bonus; race._botsBeaten=botsBeaten; race._won=won; race._got=got;
    race._isPB = (race.me.score > 0 && race.me.score === (p.bestRace||0));
    subView='raceEnd'; render();
    if(won){ sfx('win'); confetti({count:160}); haptic([40,60,40,60,80,40,80]);
      setTimeout(()=>confetti({count:60}), 400);
    }
    else { sfx('lose'); }
    if(race._isPB){ setTimeout(()=>{ sfx('badge'); confetti({count:50}); }, 500); }
    got.forEach((g,i)=>setTimeout(()=>toast(g.name,true,g.icon), 400+i*300));
  }

  function currentRoundName(){
    for(const r of race.rounds){ if(race.idx<r.end) return r.name; }
    return race.rounds[race.rounds.length-1].name;
  }

  function renderRace(){
    const p=currentPlayer(); const qq=race.deck[race.idx]; const total=qq._lines.length;
    const shown=qq._lines.slice(0,race.revealedLines); const hidden=total-race.revealedLines;
    const progress=((race.idx+(race.phase==='resolved'?1:0))/race.deck.length)*100;
    const frozen = Date.now()<race.frozenUntil;

    // buzzer lineup: you + 3 bots
    const lineup=[{name:p.name,avatar:p.avatar,score:race.me.score,me:true}]
      .concat(race.bots.slice(0,3).map(b=>({name:b.name,avatar:b.avatar,score:b.score,me:false})));
    const buzzedBot = race.lastResult&&race.lastResult.who==='bot'?race.lastResult.bot.name:(race.lastResult&&race.lastResult.taker?race.lastResult.taker.name:null);
    const lineHtml=lineup.map(x=>{
      const active = race.lastResult && ((race.lastResult.who==='me'&&x.me)|| (buzzedBot===x.name));
      const cls = active ? (race.lastResult.who==='me'?'win':(x.me?'':'lose')) : '';
      const armed = race.phase==='answering' && x.me ? 'armed' : '';
      return `<div class="buzzer ${x.me?'me':''} ${active?'lit':''} ${cls} ${armed}">
        <div class="bz">${x.avatar}</div><div class="bzn">${x.name}${x.me?' (you)':''}</div><div class="bzs">${x.score}</div></div>`;
    }).join('');

    const cluesHtml=shown.map((c,i)=>{const isTag=/for the point|ftp|name this|name these/i.test(c)&&i===total-1;return `<p class="clue ${isTag?'tag-line':''}">${c}</p>`;}).join('');

    let resolveHtml='', actionsHtml='';
    // power-up bar builder (shared) — shows owned power-ups relevant to the phase
    function powerbar(phase){
      const pu=p.powerups;
      const armedT = (race.shieldArmed?' 🛡️':'')+(race.doubleNext?' ✨':'');
      const defs=[
        {id:'time',  icon:'⏱️', phases:['reading','answering']},
        {id:'fifty', icon:'➗', phases:['reading']},
        {id:'hint',  icon:'💡', phases:['reading','answering']},
        {id:'freeze',icon:'🧊', phases:['reading']},
        {id:'slowmo',icon:'🐌', phases:['reading']},
        {id:'shield',icon:'🛡️', phases:['reading','answering']},
        {id:'double',icon:'✨', phases:['reading']},
        {id:'steal', icon:'⚡', phases:['reading','resolved']},
      ];
      const btns=defs.filter(d=>d.phases.includes(phase)).map(d=>{
        const n=pu[d.id]||0;
        const on=(d.id==='freeze'&&frozen)||(d.id==='shield'&&race.shieldArmed)||(d.id==='double'&&race.doubleNext)||(d.id==='slowmo'&&race.slowmoThisQ);
        return `<button class="pwr ${on?'on':''}" id="pw_${d.id}" ${n<=0?'disabled':''} title="${d.id}">${d.icon} ${n}</button>`;
      }).join('');
      return btns ? `<div class="powerbar">${btns}</div>` : '';
    }
    function wirePowers(){
      const map={time:useTime,fifty:useFifty,hint:useHint,freeze:useFreeze,slowmo:useSlowmo,shield:useShield,double:useDouble,steal:useSteal};
      Object.keys(map).forEach(id=>{ const el=app.querySelector('#pw_'+id); if(el)el.onclick=map[id]; });
    }

    if(race.phase==='resolved'){
      const r=race.lastResult;
      if(r.who==='me'){
        resolveHtml=`<div class="reveal right"><div class="v">You got it! 🔔</div><div class="ans">${qq.answer}</div><div class="scored">+${r.coins} 🪙${r.early?' · early buzz':''}</div></div>`;
      } else if(r.who==='bot'){
        resolveHtml=`<div class="reveal wrong"><div class="v">${r.bot.name} buzzed first 🤖</div><div class="ans">${qq.answer}</div><div class="scored" style="color:var(--buzz-dk)">${r.bot.name} takes the point</div></div>`;
      } else if(r.who==='shield'){
        resolveHtml=`<div class="reveal right" style="background:color-mix(in srgb,#5a8cd6 22%, var(--paper));border-color:#5a8cd6;"><div class="v" style="color:#3a6cb6;">Shield absorbed it 🛡️</div><div class="ans">${qq.answer}</div><div class="scored" style="color:#3a6cb6;">No point lost — keep going</div></div>`;
      } else {
        const lead = r.timedOut ? 'Time ran out' : 'Wrong — locked out';
        resolveHtml=`<div class="reveal wrong"><div class="v">${lead}</div><div class="ans">${qq.answer}</div><div class="scored" style="color:var(--buzz-dk)">${r.taker?r.taker.name+' scoops it':'No one got it'}</div></div>`;
      }
      actionsHtml=`${powerbar('resolved')}<div class="actions"><button class="btn next" id="rnext">${race.idx+1<race.deck.length?'Next question →':'See standings →'}</button></div>`;
    } else if(race.phase==='answering'){
      actionsHtml=`
        <div class="answerclock-wrap"><div class="answerclock-row"><span>Your buzz — answer fast!</span><span class="answerclock" id="answerclock">${race.answerLeft}s</span></div>
          <div class="answerring-track"><div class="answerring" id="answerring" style="width:${race.answerLeft/10*100}%"></div></div></div>
        <div class="answerbox"><input id="raceans" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Type your answer and hit Enter…" value="${(race.typed||'').replace(/"/g,'&quot;')}" /></div>
        <div class="actions"><button class="btn buzz" id="rlock">Lock in answer</button></div>
        ${powerbar('answering')}
        <div class="hint">You buzzed! Bots are paused${race.shieldArmed?' · 🛡️ shield armed':''}. Lock in before the timer hits zero.</div>`;
    } else {
      const nextClueNote = hidden>0 ? `Next clue auto-reveals soon · ${hidden} still hidden` : 'All clues are out — buzz when ready!';
      actionsHtml=`
        <div class="answerbox"><input id="raceans" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Read the clues, then BUZZ when you know it…" value="${(race.typed||'').replace(/"/g,'&quot;')}" /></div>
        <div class="actions"><button class="btn buzz" id="rbuzz">BUZZ 🔔</button></div>
        ${powerbar('reading')}
        <div class="hint">${frozen?'🧊 Bots frozen — buzz now!':race.shieldArmed?'🛡️ Shield armed — a wrong answer is free.':nextClueNote}</div>`;

  function buy(kind,id){
    const p=currentPlayer();
    let item, cost;
    if(kind==='pu'){ item=SHOP.powerups.find(x=>x.id===id); cost=item.cost; }
    if(kind==='av'){ item=SHOP.avatars.find(x=>x.id===id); cost=item.cost; }
    if(kind==='th'){ item=THEMES.find(x=>x.id===id); cost=item.cost; }
    if(p.coins<cost){ toast('Not enough coins — win a race!'); return; }
    p.coins-=cost;
    if(kind==='pu'){
      if(id==='streakfreeze'){ p.streakFreezes=(p.streakFreezes||0)+1; toast('Bought Streak Freeze (you have '+p.streakFreezes+')'); }
      else { p.powerups[id]=(p.powerups[id]||0)+1; toast(`Bought ${item.name}`); }
    }
    else { p.owned[id]=true; toast(`Unlocked ${item.name}`); }
    sfx('coin'); haptic(15);
    persist(); renderShop();
  }

  function applyTheme(){
    const p=currentPlayer();
    const id=(p&&p.theme)||'th_paper';
    const t=THEME_MAP[id]||THEME_MAP.th_paper;
    // palette
    ['paper','paper-2','ink','line','buzz','buzz-dk','muted'].forEach(k=>{

  /* ---------- QUIZ ENGINE ---------- */
  function startQuiz(scope){
    const p=currentPlayer(); const {cur}=rankFor(p.xp);
    const deck=buildAdaptiveDeck(p, scope, cur.setSize, cur.adaptive);
    if(!deck.length){ toast('Nothing to drill here yet'); return; }
    q={ scope, deck, idx:0, mode, rank:cur,
      revealedLines: mode==='full'?deck[0]._lines.length:1,
      answered:false, lastRight:null, lastPts:0, lastEarly:false, attemptsThisQ:0,
      points:0, streak:0, bestStreak:0, correct:0, earlyHits:0, missed:[], typed:'',
      isMistakes: scope==='mistakes', levelUpTo:null, sessionBadges:[], _pbAtStart:currentPlayer().bestStreakEver||0 };
    subView='quiz'; render();
    const inp=app.querySelector('#ansin'); if(inp)inp.focus();
  }
  function loadQ(){
    q.revealedLines=q.mode==='full'?q.deck[q.idx]._lines.length:1;
    q.answered=false;q.lastRight=null;q.typed='';q.levelUpTo=null;q.attemptsThisQ=0;
    render(); const inp=app.querySelector('#ansin'); if(inp)inp.focus();
  }
  function applyXP(p,pts){ const before=rankFor(p.xp).cur.lvl; p.xp+=pts; const after=rankFor(p.xp).cur; if(after.lvl>before)q.levelUpTo=after; }
  function recordResult(right,pts,early){
    const p=currentPlayer(); const qq=q.deck[q.idx];
    q.answered=true;q.lastRight=right;q.lastPts=pts;q.lastEarly=early;
    p.totalAnswered+=1;
    touchDailyGoal(p);
    updateMastery(p, qq._sid, qq._qidx, right, q.attemptsThisQ);
    const nb=[];
    if(right){
      q.points+=pts;q.correct+=1;q.streak+=1;q.bestStreak=Math.max(q.bestStreak,q.streak);
      p.totalCorrect+=1; if(early){q.earlyHits+=1;p.earlyHits+=1;}
      p.bestStreakEver=Math.max(p.bestStreakEver,q.streak);
      applyXP(p,pts);
      addCoins(p, early?3:2);
      if(p.totalCorrect>=1)nb.push('first_correct');
      if(q.streak>=5)nb.push('streak5'); if(q.streak>=10)nb.push('streak10');
      if(p.earlyHits>=5)nb.push('early5');
      if(p.totalAnswered>=50)nb.push('q50'); if(p.totalAnswered>=150)nb.push('q150');
      // mastery badges
      const allMs=masteryStats(p,'both');
      if(allMs.mastered>=10)nb.push('master10');
      const anyTabMastered=BANK.sheets.some(s=>{ const ms=masteryStats(p,s.id); return ms.total>0 && ms.mastered===ms.total; });
      if(anyTabMastered)nb.push('master_tab');
    } else {
      q.streak=0; q.missed.push({answer:qq.answer,sheet:qq._sheet,yours:q.typed||'(no answer)'});
    }
    const got=awardBadges(p,nb); persist();
    got.forEach(g=>{q.sessionBadges.push(g);toast(g.name,true,g.icon);});
    if(right&&pts>0)toast(`+${pts} XP${early?' · early 🔔':''}`);
    // feedback sounds + effects
    if(right){
      if(q.levelUpTo){ sfx('level'); confetti({count:140}); haptic([40,60,40,80,40]); toast('🎉 LEVEL UP! '+q.levelUpTo.title,false); }
      else { sfx('correct'); setTimeout(()=>sfx('coin'),140); }
      // XP floater
      if(pts>0) floatXP('+'+pts+' XP');
      setTimeout(()=>floatXP('+🪙',true), 200);
      // Combo overlay
      comboOverlay(q.streak);
      // Personal best streak celebration
      if(checkPB(p, q.streak)){
        setTimeout(()=>{ confetti({count:60}); sfx('badge'); toast('🏆 NEW PERSONAL BEST! '+q.streak+' streak!'); haptic([30,50,30,50,80]); }, 300);
      }
    } else {
      sfx('wrong');
      screenShake();
    }
  }
  function submitAnswer(){
    const qq=q.deck[q.idx],total=qq._lines.length,typed=(q.typed||'').trim();
    q.attemptsThisQ+=1;
    if(!typed){ giveUp(); return; }
    const right=isMatch(typed,qq);
    recordResult(right, right?pointsFor(q.revealedLines,total,q.rank.clueBonus):0, right&&q.revealedLines<total);
    render();
  }
  function giveUp(){ q.attemptsThisQ=Math.max(1,q.attemptsThisQ); recordResult(false,0,false); render(); }
  function advance(){ if(q.idx+1<q.deck.length){q.idx+=1;loadQ();} else finishRun(); }
  function finishRun(){
    const p=currentPlayer(); const total=q.deck.length; const pct=Math.round(q.correct/total*100);
    const nb=[];
    if(q.missed.length===0)nb.push('sweep');
    if(q.isMistakes && q.missed.length===0)nb.push('comeback');
    const got=awardBadges(p,nb); persist();
    got.forEach(g=>q.sessionBadges.push(g));
    subView='summary'; render();
    if(pct>=80){ sfx('win'); confetti({count:100}); haptic([40,60,40]); }
    else if(pct>=50){ sfx('correct'); }
    else { sfx('lose'); }
    got.forEach((g,i)=>setTimeout(()=>toast(g.name,true,g.icon),300+i*300));
  }

  function masteryChip(qq){
    const p=currentPlayer(); const m=getMastery(p,qq._sid,qq._qidx);
    if(m.box>=4)return `<span class="chip strong">${masteryLabel(m.box)}</span>`;
    if(m.box>=1&&m.attempts>0)return `<span class="chip weak">${masteryLabel(m.box)}</span>`;
    return `<span class="chip new">New</span>`;
  }

    }
    let actionsHtml='';

      const moreBtn=(q.mode==='buzz'&&hidden>0)?`<button class="btn ghost" id="more">Next clue (${hidden} left)</button>`:'';
      actionsHtml=`<div class="answerbox"><input id="ansin" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Type your answer, hit Enter to check…" value="${(q.typed||'').replace(/"/g,'&quot;')}" /></div>

      <div class="barwrap"><div class="bar" style="width:${progress}%"></div></div>
      <div class="scorebar"><div class="crumb" style="margin-right:auto;">Q <b>${q.idx+1}</b>/${q.deck.length}</div>
        <div class="stat pt"><div class="n">${q.points}</div><div class="k">Points</div></div>
        <div class="stat st"><div class="n">${q.streak}</div><div class="k">Streak</div></div>
        <div class="stat"><div class="n">${q.correct}</div><div class="k">Correct</div></div></div>
      ${levelHtml}
      <div class="card"><div class="head"><div class="pace">${q.mode==='buzz'?`Line ${Math.min(q.revealedLines,total)} of ${total}`:'Full question'}</div>${q.answered?'':masteryChip(qq)}<div class="worth">Worth <b>${q.answered?'—':worth}</b> pts</div></div>
        <div class="clues">${cluesHtml}</div>
        ${(!q.answered&&q.mode==='buzz'&&hidden>0)?`<div class="hiddencount">${hidden} more clue${hidden>1?'s':''} hidden…</div>`:''}
        ${revealHtml}${actionsHtml}</div>
    </div>`;
    app.querySelector('#quit').onclick=()=>{ subView=null; render(); };
    const inp=app.querySelector('#ansin'); if(inp){ inp.oninput=e=>q.typed=e.target.value; inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();submitAnswer();}}; }
    const more=app.querySelector('#more'); if(more)more.onclick=()=>{q.revealedLines=Math.min(q.revealedLines+1,total);render();app.querySelector('#ansin').focus();};
    const buzz=app.querySelector('#buzz'); if(buzz)buzz.onclick=submitAnswer;
    const dunno=app.querySelector('#dunno'); if(dunno)dunno.onclick=giveUp;
    const next=app.querySelector('#next'); if(next)next.onclick=advance;
  }

  function renderSummary(){
    const p=currentPlayer(); const total=q.deck.length; const pct=Math.round(q.correct/total*100);
    const isPerfect=q.correct===total && total>0;
    const isPB=q.bestStreak>0 && q.bestStreak>(q._pbAtStart||0);
    const sheetLabel=q.scope==='both'?'Both tabs':q.scope==='mistakes'?'Mistakes drill':BANK.sheets.find(s=>s.id===q.scope).name;
    const earned=q.sessionBadges;
    const earnedHtml=earned.length?`<div class="earned">${earned.map(b=>`<div class="e"><span>${b.icon}</span>${b.name}</div>`).join('')}</div>`:'';
    const missedHtml=q.missed.length?`<div class="missed"><h3>Sent to your Mistakes queue (${q.missed.length})</h3>${q.missed.map(m=>`<div class="m"><span>${m.answer}</span><b>you: ${m.yours}</b></div>`).join('')}</div>`:`<div class="missed"><h3>Clean sweep — nothing missed. 🧹</h3></div>`;
    const {cur}=rankFor(p.xp);
    if(isPerfect){ setTimeout(()=>{ confetti({count:180}); sfx('win'); haptic([40,60,40,60,80]); }, 200); setTimeout(()=>confetti({count:80}), 700); }
    else if(isPB){ setTimeout(()=>{ confetti({count:70}); sfx('badge'); }, 300); }
    app.innerHTML=`<div class="wrap">
      <div class="topnav"><button class="back" id="done">← Done</button><div class="crumb"><b>${sheetLabel}</b> · complete</div></div>
      <div class="summary card-base">
        <div class="eyebrow">Set score</div>
        <div class="big">${q.points}<span class="slash"> pts</span></div>
        <div class="label">${q.correct}/${total} correct · ${pct}% · Lv ${cur.lvl} ${cur.title}</div>
        ${isPerfect?'<div class="perfect-banner">⭐ PERFECT ROUND! ⭐</div>':''}
        ${isPB&&!isPerfect?'<div class="pb-banner">🏆 NEW BEST STREAK: '+q.bestStreak+'!</div>':''}
        <div class="sgrid">
          <div class="cell"><div class="n">${q.earlyHits}</div><div class="k">Early buzzes</div></div>
          <div class="cell"><div class="n">${q.bestStreak}</div><div class="k">Best streak</div></div>
          <div class="cell"><div class="n">${q.missed.length}</div><div class="k">To review</div></div>
          <div class="cell"><div class="n">${p.xp}</div><div class="k">Total XP</div></div>
        </div>
        ${earnedHtml}${missedHtml}
        <div class="sumbtns">
          ${q.missed.length?`<button class="btn buzz" id="retry">Redrill the ${q.missed.length} missed</button>`:''}
          <button class="btn next" id="again">New adaptive set</button>
          <button class="btn ghost" id="done2">Back to Practice</button>
        </div>
      </div>
    </div>`;
    app.querySelector('#done').onclick=()=>{ subView=null; activeTab='mistakes'; render(); };
    app.querySelector('#done2').onclick=()=>{ subView=null; activeTab='mistakes'; render(); };
    app.querySelector('#again').onclick=()=>startQuiz(q.scope);
    const retry=app.querySelector('#retry'); if(retry)retry.onclick=()=>startQuiz('mistakes');
  }

  /* ---------- BOOT ---------- */
  // Browsers require a user gesture to start audio; resume on first interaction.
  function unlockAudio(){ const ac=audio(); if(ac&&ac.state==='suspended')ac.resume(); }
  rootEl.addEventListener('pointerdown', unlockAudio, { once:true });
  applyTheme();

  async function boot(){
    if(CLOUD_ON){
      // 1. If the user arrived via a password-reset link, let them set a new password.
      let isRecovery = /type=recovery/.test(location.hash||'') || /type=recovery/.test(location.search||'');
      SB.auth.onAuthStateChange((event)=>{ if(event==='PASSWORD_RECOVERY'){ view='resetpw'; render(); } });
      // 2. Restore an existing session (this is what makes the SAME account work on any device).
      try{
        const user = await Cloud.getUser();
        if(isRecovery){ view='resetpw'; render(); return; }
        if(user){ await enterCloudUser(user); return; }
      }catch(e){}
      view='welcome'; render(); return;
    }
    render();
  }
  boot();
})();
</script>
<script>
// PWA: register service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// OneSignal push notifications (replace 04e1da51-3f5a-4bca-af0b-211e844801bf with your real app ID)
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(function(OneSignal) {
  OneSignal.init({
    appId: "04e1da51-3f5a-4bca-af0b-211e844801bf",
    notifyButton: { enable: false },
  });
});

// ===== INSTALL PROMPT — cross-platform (iOS Safari, Chrome, Samsung, etc.) =====
(function(){
  // Don't show if already installed as PWA
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
  if(isStandalone) return;

  // Don't show if user already dismissed it
  try{ if(localStorage.getItem('iac_install_dismissed')) return; }catch(e){}

  // Detect platform
  const ua = navigator.userAgent || '';
  const isIOS = /iPhone|iPad|iPod/.test(ua) && !window.MSStream;
  const isSafari = isIOS && !(/CriOS|FxiOS|OPiOS|EdgiOS/.test(ua));
  const isAndroid = /Android/.test(ua);
  const isChrome = /Chrome/.test(ua) && !/Edge|Edg|OPR|SamsungBrowser/.test(ua);
  const isSamsung = /SamsungBrowser/.test(ua);
  const isMobile = isIOS || isAndroid || /Mobile|Tablet/.test(ua);

  // Only show on mobile/tablet — desktop users don't need an install prompt
  if(!isMobile) return;

  // On Android Chrome/Samsung, capture the native install prompt
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
  });

  // Build the banner after a short delay so it doesn't interrupt login
  setTimeout(()=>{
    // Double-check not dismissed
    try{ if(localStorage.getItem('iac_install_dismissed')) return; }catch(e){}
    if(window.matchMedia('(display-mode: standalone)').matches || navigator.standalone) return;

    let stepsHtml = '';
    let canNativeInstall = false;

    if(isSafari){
      stepsHtml = `
        <div class="install-step"><span class="install-num">1</span><span>Tap the <b>Share</b> button (square with arrow) at the bottom of Safari</span></div>
        <div class="install-step"><span class="install-num">2</span><span>Scroll down and tap <b>"Add to Home Screen"</b></span></div>
        <div class="install-step"><span class="install-num">3</span><span>Tap <b>Add</b> in the top right</span></div>
      `;
    } else if(isIOS){
      stepsHtml = `
        <div class="install-step"><span class="install-num">1</span><span>Open this page in <b>Safari</b> (not this browser)</span></div>
        <div class="install-step"><span class="install-num">2</span><span>Tap the <b>Share</b> button (square with arrow)</span></div>
        <div class="install-step"><span class="install-num">3</span><span>Tap <b>"Add to Home Screen"</b></span></div>
      `;
    } else if(isAndroid && (isChrome || isSamsung)){
      canNativeInstall = !!deferredPrompt;
      if(canNativeInstall){
        stepsHtml = `
          <div class="install-step"><span>Tap the <b>Install</b> button below to add IAC Practice to your home screen.</span></div>
        `;
      } else {
        stepsHtml = `
          <div class="install-step"><span class="install-num">1</span><span>Tap the <b>three-dot menu</b> in the top right corner</span></div>
          <div class="install-step"><span class="install-num">2</span><span>Tap <b>"Install app"</b> or <b>"Add to Home screen"</b></span></div>
          <div class="install-step"><span class="install-num">3</span><span>Tap <b>Install</b></span></div>
        `;
      }
    } else {
      // Other mobile browsers
      stepsHtml = `
        <div class="install-step"><span>Open your browser menu and look for <b>"Install app"</b> or <b>"Add to Home Screen"</b> to install.</span></div>
      `;
    }

    const banner = document.createElement('div');
    banner.id = 'installBanner';
    banner.innerHTML = `
      <div class="install-card">
        <div class="install-header">
          <span class="install-emoji">📲</span>
          <div>
            <div class="install-title">Install IAC Practice</div>
            <div class="install-sub">Add it to your home screen for the full app experience — no browser bar, loads instantly.</div>
          </div>
        </div>
        <div class="install-steps">${stepsHtml}</div>
        <div class="install-btns">
          ${canNativeInstall ? '<button class="install-btn primary" id="installNow">Install</button>' : ''}
          <button class="install-btn dismiss" id="installDismiss">Maybe later</button>
        </div>
      </div>
    `;
    document.body.appendChild(banner);

    // Animate in
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ banner.classList.add('show'); }));

    // Wire buttons
    const dismiss = ()=>{
      banner.classList.remove('show');
      setTimeout(()=>banner.remove(), 400);
      try{ localStorage.setItem('iac_install_dismissed', '1'); }catch(e){}
    };
    document.getElementById('installDismiss').onclick = dismiss;

    if(canNativeInstall){
      document.getElementById('installNow').onclick = async ()=>{
        if(deferredPrompt){
          deferredPrompt.prompt();
          const result = await deferredPrompt.userChoice;
          deferredPrompt = null;
        }
        dismiss();
      };
    }
  }, 2500); // show after 2.5s so user sees the app first
})();
</script>
